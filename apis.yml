aid: therapynotes
url: https://raw.githubusercontent.com/api-evangelist/therapynotes/refs/heads/main/apis.yml
name: TherapyNotes
kind: company
description: >-
  TherapyNotes is a HIPAA-compliant practice management and electronic health
  record (EHR) platform built specifically for behavioral health - therapists,
  psychologists, psychiatrists, social workers, and group practices. It provides
  interactive note templates and clinical documentation, scheduling with
  appointment reminders, a client portal, telehealth, electronic insurance
  claims and ERA, credit card processing, and TherapyFuel AI tooling. As of this
  writing TherapyNotes does NOT expose a public or partner developer API,
  webhooks, or documented programmatic interface; access to client, appointment,
  clinical-note, and billing data is through the browser application and manual
  exports only. This entry documents TherapyNotes as an API-relevant provider
  and honestly models the capability areas a behavioral-health EHR API would
  cover; the API surfaces below are modeled, not published, and no endpoints are
  fabricated.
